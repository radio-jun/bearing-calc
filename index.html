<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방위각 계산기 & 날씨 정보</title>
  <style>
    /* 모바일 가독성을 높인 직관적인 UI 스타일링 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #f5f6fa;
      color: #2c3e50;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
      border-bottom: 2px solid #3498db;
      padding-bottom: 8px;
      color: #2c3e50;
      font-size: 18px;
    }
    .section {
      margin-bottom: 25px;
    }
    .input-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #ccd1d9;
      border-radius: 6px;
      font-size: 14px;
      background-color: #f8f9fa;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #3498db;
      background-color: #fff;
    }
    
    /* 버튼 스타일 조정 (모바일 터치 영역 확보) */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background-color: #3498db;
      color: white;
    }
    .btn-primary:hover { background-color: #2980b9; }
    
    .btn-save {
      background-color: #2ecc71;
      color: white;
    }
    .btn-save:hover { background-color: #27ae60; }

    .btn-clear {
      background-color: #e74c3c;
      color: white;
    }
    .btn-clear:hover { background-color: #c0392b; }

    /* 지도 영역 */
    #map {
      width: 100%;
      height: 300px;
      background-color: #e9ecef;
      border-radius: 8px;
      margin-top: 15px;
      display: none; /* 지도가 생성되면 표시됨 */
      border: 1px solid #ccd1d9;
    }

    /* 설정 영역 */
    .setting-group {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #e6e9ed;
      margin-top: 15px;
    }
    
    /* 피드백 메시지 */
    .alert-msg {
      display: block;
      font-size: 13px;
      margin-top: 8px;
      height: 18px;
      transition: opacity 0.3s ease;
      opacity: 0;
      font-weight: bold;
    }
    .alert-msg.show {
      opacity: 1;
    }
    
    .result-box {
      background: #edf2f7;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-family: monospace;
      white-space: pre-line;
      font-size: 13px;
    }
    hr {
      border: 0;
      height: 1px;
      background: #e6e9ed;
      margin: 20px 0;
    }
  </style>
  
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>

<div class="container">
  
  <div class="section">
    <h2>방위각 계산 및 지도 확인</h2>
    <div class="input-group">
      <label for="search-address">주소 입력</label>
      <input type="text" id="search-address" placeholder="아래 주소 검색 버튼을 눌러주세요" readonly />
      <div class="btn-row">
        <button class="btn-primary" onclick="openPostcode()">주소 검색</button>
      </div>
    </div>
    
    <div class="input-group">
      <label for="detail-address">상세 주소 (자동 연동 좌표)</label>
      <input type="text" id="detail-address" placeholder="주소를 선택하면 위도/경도가 여기에 표시됩니다" readonly />
    </div>

    <div id="map"></div>
  </div>

  <hr>

  <div class="section">
    <h2>기상 정보 조회</h2>
    <button class="btn-primary" onclick="getWeatherData()">날씨 정보 가져오기</button>
    <div id="weather-result" class="result-box">날씨 정보가 여기에 표시됩니다.</div>
  </div>

  <hr>

  <div class="section">
    <h2>API 설정</h2>
    
    <div class="setting-group">
      <label for="kakao-key">카카오 JavaScript API 키</label>
      <input type="text" id="kakao-key" placeholder="JavaScript 키를 입력하세요" />
      <div class="btn-row">
        <button class="btn-save" onclick="saveApiKey('kakao')">저장</button>
        <button class="btn-clear" onclick="clearApiKey('kakao')">초기화</button>
      </div>
      <span id="kakao-alert" class="alert-msg"></span>
    </div>

    <div class="setting-group">
      <label for="weather-key">기상청 단기예보 일반인증키</label>
      <input type="text" id="weather-key" placeholder="일반인증키를 입력하세요" />
      <div class="btn-row">
        <button class="btn-save" onclick="saveApiKey('weather')">저장</button>
        <button class="btn-clear" onclick="clearApiKey('weather')">초기화</button>
      </div>
      <span id="weather-alert" class="alert-msg"></span>
    </div>
  </div>

</div>

<script>
  let currentLat = null;
  let currentLng = null;

  // 페이지 실행 시 로컬 스토리지 데이터 동기화
  window.onload = function() {
    const savedKakao = localStorage.getItem('kakao_api_key');
    const savedWeather = localStorage.getItem('weather_api_key');

    if (savedKakao) {
      document.getElementById('kakao-key').value = savedKakao;
      loadKakaoMapSDK(savedKakao); // 지도 엔진 로드
    }
    if (savedWeather) {
      document.getElementById('weather-key').value = savedWeather;
    }
  }

  // [설정] 개별 저장 기능
  function saveApiKey(type) {
    const inputElement = document.getElementById(`${type}-key`);
    const alertElement = document.getElementById(`${type}-alert`);
    const keyValue = inputElement.value.trim();

    if (!keyValue) {
      alertElement.style.color = '#e74c3c';
      showAlert(alertElement, "키를 입력해 주세요.");
      return;
    }

    localStorage.setItem(`${type}_api_key`, keyValue);
    alertElement.style.color = '#2ecc71';
    showAlert(alertElement, "적용되었습니다.");

    if (type === 'kakao') {
      loadKakaoMapSDK(keyValue);
    }
  }

  // [설정] 개별 초기화 기능
  function clearApiKey(type) {
    const inputElement = document.getElementById(`${type}-key`);
    const alertElement = document.getElementById(`${type}-alert`);

    inputElement.value = '';
    localStorage.removeItem(`${type}_api_key`);
    alertElement.style.color = '#e74c3c';
    showAlert(alertElement, "초기화되었습니다.");

    // 카카오 키 초기화 시 기존 로드된 지도 스크립트도 제거
    if (type === 'kakao') {
      const existingScript = document.getElementById('kakao-map-script');
      if (existingScript) existingScript.remove();
      document.getElementById('map').style.display = 'none';
    }
  }

  function showAlert(element, message) {
    element.innerText = message;
    element.classList.add('show');
    setTimeout(() => {
      element.classList.remove('show');
    }, 2500);
  }

  // 카카오 지도 엔진 로딩 함수
  function loadKakaoMapSDK(apiKey) {
    const existingScript = document.getElementById('kakao-map-script');
    if (existingScript) {
      existingScript.remove();
    }

    const script = document.createElement('script');
    script.id = 'kakao-map-script';
    script.type = 'text/javascript';
    // 라이브러리에 services(좌표변환기)를 반드시 명시합니다.
    script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${apiKey}&libraries=services&autoload=false`;
    
    script.onload = () => {
      kakao.maps.load(() => {
        console.log("카카오 맵 SDK 로드 완료");
      });
    };
    script.onerror = () => {
      console.error("카카오 맵 SDK 로드 실패. API 키를 확인해 주세요.");
    };
    document.head.appendChild(script);
  }

  // 주소 검색 버튼 작동 함수 (카카오 키 등록 여부와 상관없이 무조건 주소창이 뜸)
  function openPostcode() {
    new daum.Postcode({
      oncomplete: function(data) {
        const roadAddr = data.roadAddress; // 선택한 도로명 주소
        document.getElementById('search-address').value = roadAddr;

        // 카카오 지도 키가 입력되어 있을 때만 위경도 좌표 변환을 시도합니다.
        const savedKakao = localStorage.getItem('kakao_api_key');
        if (savedKakao && typeof kakao !== 'undefined' && kakao.maps && kakao.maps.services) {
          convertAddressToCoords(roadAddr);
        } else {
          document.getElementById('detail-address').value = "카카오 JavaScript 키가 없거나 저장되지 않아 좌표를 불러올 수 없습니다.";
        }
      }
    }).open();
  }

  // 주소를 위경도 좌표로 변환하고 지도 띄우기
  function convertAddressToCoords(address) {
    const geocoder = new kakao.maps.services.Geocoder();

    geocoder.addressSearch(address, function(result, status) {
      if (status === kakao.maps.services.Status.OK) {
        currentLat = result[0].y; // 위도
        currentLng = result[0].x; // 경도

        // 좌표 정보 표시
        document.getElementById('detail-address').value = `위도: ${currentLat} / 경도: ${currentLng}`;

        // 지도 띄우기
        const mapContainer = document.getElementById('map');
        mapContainer.style.display = 'block';

        displayKakaoMap(currentLat, currentLng);
      } else {
        alert("좌표 변환 실패: 카카오 개발자 콘솔의 플랫폼 도메인 설정을 확인해 주세요.");
      }
    });
  }

  // 실제 지도 렌더링 함수
  function displayKakaoMap(lat, lng) {
    kakao.maps.load(() => {
      const container = document.getElementById('map');
      const coords = new kakao.maps.LatLng(lat, lng);
      
      const options = {
        center: coords,
        level: 3
      };

      const map = new kakao.maps.Map(container, options);

      // 마커 추가
      const marker = new kakao.maps.Marker({
        map: map,
        position: coords
      });

      map.relayout();
      map.setCenter(coords);
    });
  }

  // 기상청 날씨 데이터 호출 기능
  function getWeatherData() {
    const weatherKey = localStorage.getItem('weather_api_key');
    const resultBox = document.getElementById('weather-result');

    if (!weatherKey) {
      resultBox.innerText = "설정 탭에서 기상청 일반인증키를 먼저 저장해 주세요.";
      return;
    }

    if (!currentLat || !currentLng) {
      resultBox.innerText = "먼저 주소 검색을 완료하여 기준 위치(좌표)를 설정해 주세요.";
      return;
    }

    const nx = 60;
    const ny = 127;

    const today = new Date();
    const baseDate = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
    const baseTime = "0500"; 

    resultBox.innerText = "날씨 데이터를 가져오는 중...";

    const baseUrl = "https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst";
    const params = new URLSearchParams({
      serviceKey: weatherKey,
      pageNo: '1',
      numOfRows: '10',
      dataType: 'JSON',
      base_date: baseDate,
      base_time: baseTime,
      nx: nx,
      ny: ny
    });

    fetch(`${baseUrl}?${params.toString()}`)
      .then(response => {
        if (!response.ok) throw new Error("네트워크 응답 오류");
        return response.json();
      })
      .then(data => {
        if (data.response && data.response.header.resultCode === "00") {
          const items = data.response.body.items.item;
          let outputText = `📍 서울 기준 날씨 예보 (발표일자: ${baseDate})\n`;
          items.forEach(item => {
            if (item.category === "TMP") outputText += `• 기온: ${item.fcstValue}°C\n`;
            if (item.category === "SKY") {
              let skyStatus = "맑음";
              if (item.fcstValue === "3") skyStatus = "구름많음";
              if (item.fcstValue === "4") skyStatus = "흐림";
              outputText += `• 하늘상태: ${skyStatus}\n`;
            }
          });
          resultBox.innerText = outputText;
        } else {
          const errMsg = data.response ? data.response.header.resultMsg : "API 설정 미승인 또는 대기 상태";
          resultBox.innerText = `❌ 오류 발생: ${errMsg}\n(승인 대기 중이거나 키 문제일 수 있습니다.)`;
        }
      })
      .catch(error => {
        resultBox.innerText = `❌ 연결 실패: 인증키 승인 대기 시간이 필요하거나 네트워크 환경을 확인해 주세요.`;
        console.error(error);
      });
  }
</script>
</body>
</html>
